<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartTrip CR · Panel de administración</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-dark st-navbar">
    <div class="container">
      <span class="navbar-brand d-flex align-items-center gap-2">
        <i class="bi bi-signpost-split-fill fs-4"></i>
        <span>
          SmartTrip <span class="text-warning">CR</span>
        </span>
      </span>
      <span class="navbar-text small">Panel de administración</span>
    </div>
  </nav>

  <main class="container my-4">

    <!-- Navegación entre colecciones (se llena dinámicamente desde app.js) -->
    <ul class="nav nav-pills st-nav-pills mb-4" id="entity-tabs"></ul>

    <!-- Contenido de cada colección (se llena dinámicamente desde app.js) -->
    <div id="tab-content"></div>

  </main>

  <footer class="text-center text-muted small py-4">
    <i class="bi bi-signpost-split-fill me-1"></i>
    SmartTrip CR · Proyecto NoSQL 2026
  </footer>

  <!-- Modal de confirmación de eliminación (genérico, se reutiliza para todas las colecciones) -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill text-warning me-1"></i> Confirmar eliminación</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          ¿Seguro que desea eliminar <strong id="delete-target-name"></strong>? Esta acción no se puede deshacer.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirm-delete-btn">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
